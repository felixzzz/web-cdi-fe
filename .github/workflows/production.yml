name: production-deployment

on:
  push:
    branches: [main]

jobs:
  nodejs-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH remote command executer
        # You may pin to the exact commit or the version.
        uses: tarunjangra/ssh-remote-cmd@v1
        with:
          # Command to execute on the remote server.
          command: |
            . ~/.nvm/nvm.sh
            cd /home/ubuntu/app/cdi-fe
            git stash
            git stash clear
            git pull origin main
            nvm exec v22.21.1 npm install
            nvm exec v22.21.1 npm run build
            pm2 restart 0
            cd ~/app
            pm2 restart 0
            pm2 start pm2.config.js

          # Hostname or IP address of the server.
          host: ${{secrets.HOST_ADDRESS}}
          # Username for authentication to server.
          user: ${{secrets.HOST_USER}}
          # Port number of the server.
          port: 22
          # File Location or string that contains a private key for either key-based or hostbased user authentication (OpenSSH format)
          key: ${{secrets.PRIVATE_KEY}}

      - name: Google Chat Notification
        uses: Co-qn/google-chat-notification@releases/v1
        with:
          name: CDI FE (Production) Deployment
          url: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          status: ${{ job.status }}
          if: always()
